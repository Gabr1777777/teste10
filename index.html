<script>
function showSection(id,el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// LISTA DE MÚSICAS CORRIGIDA
const songs = [
  { artist: "Abraham Mateo", title: "BAI LALA", src: "https://www.dropbox.com/scl/fi/gw8940zfvm60ul7malxox/Abraham-Mateo-BAI-LALA.mp3?rlkey=puytwnkxllb6tmz35htfr8tmh&st=ud55ktgf&raw=1" },
  { artist: "Alex Warren", title: "Ordinary", src: "https://www.dropbox.com/scl/fi/lpcx92wv63wzcm6z56l7q/Alex-Warren-Ordinary.mp3?rlkey=pdxjo778t66ecrja08pfyij6k&st=zb53k17t&raw=1" },          
  { artist: "Eminem", title: "You dont know", src: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
  { artist: "Rising to the Night", title: "Sound of Silence", src: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
  { artist: "Desireless", title: "Voyage Voyage", src: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=2ldonj76&raw=1" }
];

let current = 0;
let isPlaying = false;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const artist = document.getElementById("artist");
const title = document.getElementById("title");
const reproductor = document.getElementById("reproductor");

function loadSong(index) {
  audio.src = songs[index].src;
  artist.textContent = songs[index].artist;
  title.textContent = songs[index].title;
  
  audio.play().then(() => {
    isPlaying = true;
    playBtn.textContent = "❚❚";
  }).catch(e => console.log("Erro ao tocar:", e));
}

// BOTÃO ENTRAR - DISPARA O SOM
document.querySelector(".gold-btn").onclick = () => {
  document.getElementById("intro").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.querySelector(".app").classList.add("show");
    loadSong(current); // Começa a tocar aqui
  }, 1000);
};

playBtn.onclick = (e) => {
  e.stopPropagation();
  if (isPlaying) {
    audio.pause();
    playBtn.textContent = "▶";
  } else {
    audio.play();
    playBtn.textContent = "❚❚";
  }
  isPlaying = !isPlaying;
};

nextBtn.onclick = (e) => {
  e.stopPropagation();
  current = (current + 1) % songs.length;
  loadSong(current);
};

// PRÓXIMA AUTOMÁTICA
audio.onended = () => {
  current = (current + 1) % songs.length;
  loadSong(current);
};

reproductor.addEventListener("mouseenter", () => reproductor.classList.add("expandido"));
reproductor.addEventListener("mouseleave", () => reproductor.classList.remove("expandido"));

// TEXTO TYPING
const texto=`Sei que você sente falta daquela pessoa que você tirou do seu caminho ou que mesmo ela te tirou. Para lembrar que essa pessoa já não é quem você amou/quis algum dia. Essa pessoa mudou, talvez para melhor ou para pior, por isso a função dela nesta vida já terminou, já chegou ao fim, deixe-a ir, agradeça pelo aprendizado e por mais doloroso que seja, aceite o fim.`;
let i=0;
const typing=document.getElementById("typing");
(function escribir(){
  if(i<texto.length){
    typing.textContent+=texto.charAt(i++);
    setTimeout(escribir,35);
  }
})();

// MODAL AMIGOS
const modal = document.getElementById("modal");
const modalNombre = document.getElementById("modalNombre");
const modalDesc = document.getElementById("modalDesc");

function openModal(nombre, desc){
  modalNombre.textContent = nombre;
  modalDesc.textContent = desc;
  modal.classList.add("active");
}
function closeModal(){ modal.classList.remove("active"); }
modal.addEventListener("click", e => { if(e.target === modal) closeModal(); });

// GALERIA
const slides = document.querySelectorAll('#galeria .slide');
let currentSlide = 0;

function update(){
  slides.forEach((s,i)=>{
    s.className = 'slide';
    if(i === currentSlide) s.classList.add('active');
    else if(i === (currentSlide - 1 + slides.length) % slides.length) s.classList.add('left');
    else if(i === (currentSlide + 1) % slides.length) s.classList.add('right');
  });
}
function next(){ currentSlide = (currentSlide + 1) % slides.length; update(); }
function prev(){ currentSlide = (currentSlide - 1 + slides.length) % slides.length; update(); }

// CURSOR
const dot = document.querySelector(".cursor-dot");
const ring = document.querySelector(".cursor-ring");
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + "px"; dot.style.top = mouseY + "px";
});

function animateCursor() {
  ringX += (mouseX - ringX) * 0.15;
  ringY += (mouseY - ringY) * 0.15;
  ring.style.left = ringX + "px"; ring.style.top = ringY + "px";
  requestAnimationFrame(animateCursor);
}
animateCursor();

document.querySelectorAll("button, a, .menu-btn").forEach(el => {
  el.addEventListener("mouseenter", () => document.body.classList.add("cursor-hover"));
  el.addEventListener("mouseleave", () => document.body.classList.remove("cursor-hover"));
});

document.addEventListener("mousedown", () => {
  document.body.classList.add("cursor-click");
  const star = document.createElement("div");
  star.className = "star-explosion";
  star.style.left = mouseX + "px"; star.style.top = mouseY + "px";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 600);
});
document.addEventListener("mouseup", () => document.body.classList.remove("cursor-click"));

// SEGURANÇA
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());

// STARS BACKGROUND
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

const starArray = [];
for(let i=0;i<120;i++){
  starArray.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5 + 0.5, speed: Math.random()*0.4 + 0.2, alpha: Math.random()*0.5 + 0.4 });
}
function drawStars(){
  ctx.clearRect(0,0,w,h);
  starArray.forEach(s=>{
    ctx.beginPath();
    ctx.fillStyle = `rgba(215,190,235,${s.alpha})`;
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    s.y += s.speed;
    if(s.y > h) s.y = -5;
  });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
