<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Xatspace Glass</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:#5b3a73; /* morado base */
  overflow:hidden;
}

.app {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: scale(0.92);
  transition: all 1.2s ease;
}

.app.show {
  opacity: 1;
  transform: scale(1);
}

.frame-outer {
  background: rgba(65, 44, 44, 0.2);
  backdrop-filter: blur(8px);
  padding: 10px;
  border-radius: 25px;
  box-shadow: 0 0 25px rgba(223, 151, 238, 0.25);
}

.frame-inner {
  background: rgba(209, 131, 224, 0.226);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 15px;
}

.container {
  display: flex;
  background: rgb(174, 96, 192);
  border-radius: 15px;
  width: 600px;
  height: 440px;
  position: relative;
  border: 2px solid rgba(243, 176, 240, 0.35);
  box-shadow:
    0 0 18px rgba(255,255,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.08);
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 35%;
  background-color: rgba(83, 27, 94, 0.753);
  border-radius: 15px 0 0 15px;
  padding: 10px 17px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.sidebar::after {
  content: "";
  position: absolute;
  top: 12px;
  right: 0;
  width: 2px;
  height: 100%;
  background: linear-gradient(
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
}

.profile-pic img {
  width: 120px;
  height: 120px;
  margin-top: 17px;
  border-radius: 50%;
  object-fit: cover;
  border: 6px solid rgba(237, 187, 250, 0.5);
}

.menu {
  width: 100%;
  flex: 1;
  position: relative;
  padding-bottom: 70px;
}

.menu-buttons {
  margin-left: 20px;
  width: 80%;
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.menu-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 2px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  color: #ffffffe3;
  background: linear-gradient(
    180deg,
    rgba(54, 54, 54, 0.9),
    rgba(7, 7, 7, 0.9)
  );
  border: 1px solid rgba(255, 255, 255, 0.35);
  box-shadow:
    inset 0 0 8px rgba(173, 173, 173, 0.15),
    0 0 12px rgba(0,0,0,.6);
  transition: all .3s ease;
}

.menu-btn:hover {
  transform: translateX(4px);
}

.menu-btn.active {
  transform: scale(1.07);
}

/* ===== CONTENIDO ===== */
.content {
  flex: 1;
  background: rgba(0,0,0,.35);
  border-radius: 0 15px 15px 0;
  position: relative;
  overflow: hidden;
}

/* ===== SECCIONES ===== */
.section {
  width: 100%;
  height: 100%;
  display: none;
  animation: fadeIn .6s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== INICIO ===== */
.inicio-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
}

.inicio-title {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  text-align: center;
  background: linear-gradient(90deg,#ffd6e8,#e0c3ff,#dfc3ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:
    0 0 6px rgba(255,200,220,.6),
    0 0 14px rgba(209, 180, 255, 0.4);
  animation: fadeGlow 2.5s ease infinite;
}

@keyframes fadeGlow {
  0% { opacity: .7; }
  50% { opacity: 1; }
  100% { opacity: .7; }
}

.firma {
  margin-top: 30px;
}

.firma img {
  max-width: 350px;
  opacity: .9;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  inset: 0;
  background: rgba(59, 28, 73, 0.92);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  transition: opacity 1s ease;
}

/* ===== BOTÓN DORADO ===== */
.gold-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 38px;
  border-radius: 999px;
  cursor: pointer;
  border: 2px solid #a737d4;
  background: radial-gradient(
    circle at top,
    #784192,
    #6e397e
  );
  box-shadow:
    0 0 18px rgba(154, 55, 212, 0.45),
    inset 0 0 10px rgba(212, 120, 255, 0.25);
  transition: all .35s ease;
  animation: glowPulse 2.5s infinite ease-in-out;
}

.gold-btn:hover {
  transform: scale(1.08);
  box-shadow:
    0 0 28px rgba(149, 55, 212, 0.8),
    inset 0 0 14px rgba(222, 140, 255, 0.45);
}

.gold-btn .text {
  font-family: "Poppins", sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  font-weight: 600;
  color: #edc8fc;
  text-shadow: 0 0 6px rgba(212, 120, 255, 0.6);
}

@keyframes glowPulse {
  0%,100% {
    box-shadow: 0 0 16px rgba(149, 55, 212, 0.45), inset 0 0 10px rgba(212, 120, 255, 0.25);
  }
  50% {
    box-shadow: 0 0 30px rgba(154, 55, 212, 0.9), inset 0 0 16px rgba(220, 160, 255, 0.5);
  }
}

/* ===== SOBRE MI ===== */
.sobremi-wrapper{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:50px;
}
.sobremi-content{text-align:center;max-width:420px}
.sobremi-nombre{
  font-size:24px;
  font-weight:600;
  background:linear-gradient(90deg,#ffd6e8,#e0c3ff,#c3f0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sobremi-id{font-size:12px;color:#ffffffb0 ;margin-top:4px}
.sobremi-pais{
  display:flex;
  justify-content:center;
  margin-top:4px;
  gap:6px;
  font-size:12px;
  color:#fff;
}
.sobremi-pais img{width:18px;height:12px}
.sobremi-linea{
  width:60%;
  height:1px;
  margin:14px auto;
  background:linear-gradient(90deg,transparent,#fff,transparent);
}
.sobremi-texto{
  font-size:13px;
  line-height:1.6;
  color:#ffffffd8;
  white-space:pre-line;
}
.cursor{
  display:inline-block;
  width:2px;
  height:14px;
  background:#fff;
  margin-left:3px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

/* ===== FRIENDS ===== */
.amigos-title{
  position: relative;
  top: 10px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 4px;
  font-weight: 500;
  background: linear-gradient(90deg,#ffd1dc,#e0c3ff,#e2c3ff,#ffd1dc);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 6px rgba(255,180,200,.6), 0 0 14px rgba(200,180,255,.4);
}

.amigos-container{
  position: relative;
  top: 20px;
  width: 100%;
  height: calc(100% - 80px);
  display: flex;
  justify-content: center;
  align-items: center;
}

.amigos-collage{
  position: relative;
  width: 90%;
  height: 250px;
}

.amigo-polaroid{
  position: absolute;
  width: 130px;
  height: 160px;
  background: linear-gradient(145deg, rgba(127, 63, 156, 0.45), rgba(130, 92, 155, 0.45));
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 12px;
  box-shadow: 0 4px 12px rgba(87, 36, 100, 0.5);
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: transform .3s ease, box-shadow .3s ease;
  overflow: hidden;
  text-align: center;
}

.amigo-polaroid:hover{
  transform: scale(1.1) rotate(0deg) !important;
  z-index: 10;
  box-shadow: 0 0 20px rgba(212, 120, 255, 0.6);
}

.amigo-polaroid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}

.amigo-polaroid p{
  margin:4px 0 0;
  font-size:12px;
  color:#fff;
  font-weight:600;
}

.polaroid-0{ top: 10px; left: 30px; transform: rotate(-6deg); }
.polaroid-1{ top: 5px; right: 30px; transform: rotate(5deg); }
.polaroid-2{ bottom: 10px; left: 50%; transform: translateX(-50%) rotate(-2deg); }

/* modal */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(127, 73, 143, 0.6);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-overlay.active{display:flex}

.modal-contenido{
  width:260px;
  background:linear-gradient(135deg, rgba(210, 155, 241, 0.95), rgba(208, 169, 224, 0.95));
  border-radius:14px;
  padding:18px;
  text-align:center;
  color:#2b2b2b;
  box-shadow:0 0 18px rgba(50,50,50,.8);
  animation:pop .35s ease;
}

@keyframes pop{
  from{transform:scale(.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

.modal-contenido h3{margin:0 0 6px;color:#fff}
.modal-contenido p{font-size:.8rem;line-height:1.3rem}
.modal-contenido button{
  margin-top:12px;
  padding:6px 16px;
  border:none;
  border-radius:8px;
  background:#4a4a4a;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* === REPRODUCTOR === */
.reproductor {
  position: fixed;   
  bottom: 35px;
  left: 30px;
  width: 100px;
  height: 42px;
  background: linear-gradient(145deg, #e0e0e0, #d6d6d6);
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 5px 8px;
  transition: all 0.5s ease;
  box-shadow: 0 4px 8px rgba(0,0,0,.2);
  overflow: hidden;
  cursor: pointer;
  z-index: 9999;
}

.reproductor.expandido {
  width: 230px;
}

.song-info {
  position: relative;
  margin-right: 5%;
  opacity: 0;
  width: 100px;
  transform: translateX(-20px);
  transition: all .5s ease;
  color: #000;
  font-size: 11px;
  text-align: left;
}

.reproductor.expandido .song-info {
  opacity: 1;
  transform: translateX(0);
}

.titulo { margin: 0; font-weight: 600; }
.cancion { margin: 0; opacity: .8; }

.controles { display: flex; align-items: center; gap: 6px; }

.btn-control {
  background: #000;
  color: #e2e2e2;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 13px;
  cursor: pointer;
  transition: .3s;
}

.btn-control:hover { transform: scale(1.1); }

.volume-container { display: none; align-items: center; margin-right: 5px; }
.reproductor.expandido .volume-container { display: flex; }
#volumeRange { width: 40px; cursor: pointer; accent-color: #000; }

/* ===== GALERIA ===== */
.gallery-title{
  position: relative;
  top: 10px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 5px;
  font-weight: 500;
  background: linear-gradient(90deg,#ffd1dc,#e0c3ff,#c3f0ff,#ffd1dc);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 8px rgba(255,180,200,.6), 0 0 16px rgba(200,180,255,.4);
}

.gallery-box{
  position: relative;
  width: 100%;
  height: 70%;
  top: 30px;
}

.slider{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide{
  position:absolute;
  width:150px;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  transition:.6s ease;
  filter:brightness(.4);
  transform:scale(.7);
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  opacity: 0;
  z-index: 1;
}

.slide img{ width:100%; height:100%; object-fit:cover; }

.slide.active{
  transform:scale(1);
  filter:brightness(1);
  box-shadow: 0 0 20px rgba(255,255,255,.3);
  z-index:3;
  opacity: 1;
}

.slide.left{
  opacity: 0.6;
  transform: translateX(-140px) scale(.8);
  z-index: 2;
}

.slide.right{
  opacity: 0.6;
  transform: translateX(140px) scale(.8);
  z-index: 2;
}

.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:30px;
  height:30px;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
  z-index:10;
  transition: .3s;
}

.nav:hover{ background:rgba(255,255,255,.5); }
.nav.prev{left:10px}
.nav.next{right:10px}

/* ===== CURSOR FANTASÍA ===== */
body { cursor: none; }
.cursor-dot, .cursor-ring {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 100000;
  transform: translate(-50%, -50%);
}

.cursor-dot::after {
  content: "";
  position: absolute;
  left: -6px; top: 2px;
  width: 12px; height: 12px;
  background: radial-gradient(circle, rgba(255,255,255,.9), transparent 70%);
  opacity: .6;
  animation: glowMove 1.2s linear infinite;
}

.cursor-ring {
  width: 36px; height: 36px;
  border: 2px solid rgba(226, 200, 255, 0.6);
  border-radius: 50%;
  transition: width .15s ease, height .15s ease;
}

.cursor-hover .cursor-ring { width: 52px; height: 52px; }
.cursor-click .cursor-ring { width: 26px; height: 26px; }

.star-explosion {
  position: fixed;
  width: 8px; height: 8px;
  background: radial-gradient(circle, #fff, #be4dff);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  animation: explode .6s ease-out forwards;
}

@keyframes explode {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(4); opacity: 0; }
}

html, body, * {
  cursor: none !important;
  user-select: none !important;
  -webkit-user-select: none;
}

.menu-btn {
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
  background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.35));
  border: 1px solid rgba(255,255,255,.35);
  background-image: linear-gradient(90deg, #ffd1dc, #e0c3ff, #c3f0ff, #ffd1dc);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: menuTextFlow 4s linear infinite;
}

@keyframes menuTextFlow {
  from { background-position: 0%; }
  to   { background-position: 300%; }
}

.title-glass {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  padding: 6px 20px;
  margin: 15px auto;
  background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05));
  backdrop-filter: blur(14px);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.3);
  pointer-events: none;
  width: fit-content;
}

#stars{ position:fixed; inset:0; z-index:-1; background:#5b3a73; }
.footer{ position:absolute; bottom:15px; left:50%; transform:translateX(-50%); font-size:9px; color:#fdeef0aa; }

#security-alert {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(83, 27, 94, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(237, 187, 250, 0.5);
  padding: 10px 25px;
  border-radius: 20px;
  color: #edc8fc;
  font-size: 13px;
  z-index: 1000000;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#security-alert.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
const alertBox = document.getElementById('security-alert');
function triggerAlert() {
  alertBox.classList.add('show');
  setTimeout(() => alertBox.classList.remove('show'), 2000);
}

document.addEventListener('contextmenu', e => { e.preventDefault(); triggerAlert(); });
document.addEventListener('keydown', e => {
  if ((e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 'U')) { e.preventDefault(); triggerAlert(); }
});
document.addEventListener('selectstart', e => { e.preventDefault(); triggerAlert(); });

function showSection(id, el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  if(id === 'galeria') updateSlider();
}

const playlist = [
  { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
  { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=2ldonj76&raw=1" }
];

let current = 0;
let isPlaying = false;
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const artist = document.getElementById("artist");
const title = document.getElementById("title");
const reproductor = document.getElementById("reproductor");

function loadSong(index) {
  const song = playlist[index];
  audio.src = song.url;
  const parts = song.name.split(" - ");
  artist.textContent = parts[0];
  title.textContent = parts[1];
  audio.play().then(() => { isPlaying = true; playBtn.textContent = "❚❚"; }).catch(()=>{});
}

playBtn.onclick = (e) => {
  e.stopPropagation();
  if (isPlaying) { audio.pause(); playBtn.textContent = "▶"; } 
  else { audio.play(); playBtn.textContent = "❚❚"; }
  isPlaying = !isPlaying;
};

nextBtn.onclick = (e) => { e.stopPropagation(); current = (current + 1) % playlist.length; loadSong(current); };
audio.onended = () => { current = (current + 1) % playlist.length; loadSong(current); };
document.getElementById("volumeRange").oninput = (e) => { audio.volume = e.target.value; };

reproductor.addEventListener("mouseenter", () => reproductor.classList.add("expandido"));
reproductor.addEventListener("mouseleave", () => reproductor.classList.remove("expandido"));

/* LOGICA SLIDER GALERIA */
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;

function updateSlider(){
  slides.forEach((s, index) => {
    s.classList.remove('active', 'left', 'right');
    s.style.opacity = "0";
    if(index === currentSlide) {
      s.classList.add('active');
      s.style.opacity = "1";
    } else if(index === (currentSlide - 1 + slides.length) % slides.length) {
      s.classList.add('left');
      s.style.opacity = "0.6";
    } else if(index === (currentSlide + 1) % slides.length) {
      s.classList.add('right');
      s.style.opacity = "0.6";
    }
  });
}

function next(){ currentSlide = (currentSlide + 1) % slides.length; updateSlider(); }
function prev(){ currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateSlider(); }

/* CURSOR ANIMATION */
const dot = document.querySelector(".cursor-dot");
const ring = document.querySelector(".cursor-ring");
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + "px"; dot.style.top = mouseY + "px";
});

function animate() {
  ringX += (mouseX - ringX) * 0.15;
  ringY += (mouseY - ringY) * 0.15;
  ring.style.left = ringX + "px"; ring.style.top = ringY + "px";
  requestAnimationFrame(animate);
}
animate();

document.addEventListener("click", e => {
  const star = document.createElement("div");
  star.className = "star-explosion";
  star.style.left = e.clientX + "px"; star.style.top = e.clientY + "px";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 600);
});

/* BACKGROUND STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

const starsArray = [];
for(let i=0;i<100;i++){
  starsArray.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5, speed: Math.random()*0.3 + 0.1 });
}

function drawStars(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "rgba(215,190,235,0.8)";
  starsArray.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    s.y += s.speed;
    if(s.y > h) s.y = 0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
