<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Xatspace Glass</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:#5b3a73; /* morado base */
  overflow:hidden;
}

.app {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: scale(0.92);
  transition: all 1.2s ease;
}

.app.show {
  opacity: 1;
  transform: scale(1);
}

.frame-outer {
  background: rgba(65, 44, 44, 0.2);
  backdrop-filter: blur(8px);
  padding: 10px;
  border-radius: 25px;
  box-shadow: 0 0 25px rgba(223, 151, 238, 0.25);
}

.frame-inner {
  background: rgba(209, 131, 224, 0.226);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 15px;
}

.container {
  display: flex;
  background: rgb(174, 96, 192);
  border-radius: 15px;
  width: 600px;
  height: 440px;
  position: relative;
  border: 2px solid rgba(243, 176, 240, 0.35);
  box-shadow:
    0 0 18px rgba(255,255,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.08);
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 35%;
  background-color: rgba(83, 27, 94, 0.753);
  border-radius: 15px 0 0 15px;
  padding: 10px 17px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.sidebar::after {
  content: "";
  position: absolute;
  top: 12px;
  right: 0;
  width: 2px;
  height: 100%;
  background: linear-gradient(
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
}

.profile-pic img {
  width: 120px;
  height: 120px;
  margin-top: 17px;
  border-radius: 50%;
  object-fit: cover;
  border: 6px solid rgba(237, 187, 250, 0.5);
}

.menu {
  width: 100%;
  flex: 1;
  position: relative;
  padding-bottom: 70px;
}

.menu-buttons {
  margin-left: 20px;
  width: 80%;
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.menu-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 2px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  color: #ffffffe3;
  background: linear-gradient(
    180deg,
    rgba(54, 54, 54, 0.9),
    rgba(7, 7, 7, 0.9)
  );
  border: 1px solid rgba(255, 255, 255, 0.35);
  box-shadow:
    inset 0 0 8px rgba(173, 173, 173, 0.15),
    0 0 12px rgba(0,0,0,.6);
  transition: all .3s ease;
}

.menu-btn:hover {
  transform: translateX(4px);
}

.menu-btn.active {
  transform: scale(1.07);
}

/* ===== CONTENIDO ===== */
.content {
  flex: 1;
  background: rgba(0,0,0,.35);
  border-radius: 0 15px 15px 0;
  position: relative;
  overflow: hidden;
}

/* ===== SECCIONES ===== */
.section {
  width: 100%;
  height: 100%;
  display: none;
  animation: fadeIn .6s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== INICIO ===== */
.inicio-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
}

.inicio-title {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  text-align: center;
  background: linear-gradient(90deg,#ffd6e8,#e0c3ff,#dfc3ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:
    0 0 6px rgba(255,200,220,.6),
    0 0 14px rgba(209, 180, 255, 0.4);
  animation: fadeGlow 2.5s ease infinite;
}

@keyframes fadeGlow {
  0% { opacity: .7; }
  50% { opacity: 1; }
  100% { opacity: .7; }
}

.firma {
  margin-top: 30px;
}

.firma img {
  max-width: 350px;
  opacity: .9;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  inset: 0;
  background: rgba(59, 28, 73, 0.92);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  transition: opacity 1s ease;
}

/* ===== BOTÓN DORADO ===== */
.gold-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 38px;
  border-radius: 999px;
  cursor: pointer;
  border: 2px solid #a737d4;
  background: radial-gradient(circle at top, #784192, #6e397e);
  box-shadow: 0 0 18px rgba(154, 55, 212, 0.45), inset 0 0 10px rgba(212, 120, 255, 0.25);
  transition: all .35s ease;
  animation: glowPulse 2.5s infinite ease-in-out;
}

.gold-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 28px rgba(149, 55, 212, 0.8), inset 0 0 14px rgba(222, 140, 255, 0.45);
}

.gold-btn .text {
  font-family: "Poppins", sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  font-weight: 600;
  color: #edc8fc;
  text-shadow: 0 0 6px rgba(212, 120, 255, 0.6);
}

@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 16px rgba(149, 55, 212, 0.45), inset 0 0 10px rgba(212, 120, 255, 0.25); }
  50% { box-shadow: 0 0 30px rgba(154, 55, 212, 0.9), inset 0 0 16px rgba(220, 160, 255, 0.5); }
}

/* ===== SOBRE MI ===== */
.sobremi-wrapper{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:50px;
}
.sobremi-content{text-align:center;max-width:420px}
.sobremi-nombre{
  font-size:24px;
  font-weight:600;
  background:linear-gradient(90deg,#ffd6e8,#e0c3ff,#c3f0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sobremi-id{font-size:12px;color:#ffffffb0 ;margin-top:4px}
.sobremi-pais{
  display:flex;
  justify-content:center;
  margin-top:4px;
  gap:6px;
  font-size:12px;
  color:#fff;
}
.sobremi-pais img{width:18px;height:12px}
.sobremi-linea{
  width:60%;
  height:1px;
  margin:14px auto;
  background:linear-gradient(90deg,transparent,#fff,transparent);
}
.sobremi-texto{
  font-size:13px;
  line-height:1.6;
  color:#ffffffd8;
  white-space:pre-line;
}
.cursor{
  display:inline-block;
  width:2px;
  height:14px;
  background:#fff;
  margin-left:3px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

/* ===== FRIENDS ===== */
.amigos-title{
  position: relative;
  top: 30px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 4px;
  font-weight: 500;
  background: linear-gradient(90deg,#ffd1dc,#e0c3ff,#e2c3ff,#ffd1dc);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 6px rgba(255,180,200,.6), 0 0 14px rgba(200,180,255,.4);
  animation: glowMove 4s linear infinite, titleIn 1.2s ease;
}

.amigos-container{
  position: relative;
  top:60px;
  text-align: center;
  padding: 20px 10px;
}

.amigos-collage{
  position: relative;
  width: 100%;
  height: 230px;
  margin-top: 30px;
}

.amigo-polaroid{
  position: absolute;
  width: 48%;
  height: 150px;
  background: linear-gradient(145deg, rgba(127, 63, 156, 0.45), rgba(130, 92, 155, 0.45));
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 12px;
  box-shadow: 0 4px 12px rgba(87, 36, 100, 0.5);
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: transform .3s ease;
}

.amigo-polaroid img{ width:100%; height:120px; object-fit:cover; border-radius:10px 10px 0 0; }
.amigo-polaroid p{ margin:4px 0 0; font-size:.75rem; color:#fff; }

.polaroid-0{top:0;left:10px;transform:rotate(-5deg)}
.polaroid-1{top:-8px;left:160px;transform:rotate(6deg)}

/* modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(127, 73, 143, 0.6); backdrop-filter:blur(4px);
  display:none; justify-content:center; align-items:center; z-index:9999;
}
.modal-overlay.active{display:flex}
.modal-contenido{
  width:260px; background:linear-gradient(135deg, rgba(210, 155, 241, 0.95), rgba(208, 169, 224, 0.95));
  border-radius:14px; padding:18px; text-align:center; box-shadow:0 0 18px rgba(50,50,50,.8);
}

/* === REPRODUCTOR === */
.reproductor {
  position: fixed; bottom: 35px; left: 30px; width: 100px; height: 42px;
  background: linear-gradient(145deg, #e0e0e0, #d6d6d6); border-radius: 25px;
  display: flex; align-items: center; justify-content: flex-end; padding: 5px 8px;
  transition: all 0.5s ease; box-shadow: 0 4px 8px rgba(0,0,0,.2); overflow: hidden;
  cursor: pointer; z-index: 9999;
}

.reproductor.expandido { width: 230px; }

.song-info {
  position: relative; margin-right: 5%; opacity: 0; width: 100px;
  transform: translateX(-20px); transition: all .5s ease; color: #000; font-size: 11px;
}

.reproductor.expandido .song-info { opacity: 1; transform: translateX(0); }
.controles { display: flex; align-items: center; gap: 6px; }

.btn-control {
  background: #000; color: #e2e2e2; border: none; border-radius: 50%;
  width: 28px; height: 28px; font-size: 13px; cursor: pointer;
}

.volume-container { display: none; align-items: center; margin-right: 5px; }
.reproductor.expandido .volume-container { display: flex; }
#volumeRange { width: 40px; accent-color: #000; cursor: pointer; }

/* ===== GALERIA ===== */
.gallery-title{
  position: relative; top: 10px; text-align: center; font-size: 14px; letter-spacing: 5px;
  background: linear-gradient(90deg,#ffd1dc,#e0c3ff,#c3f0ff,#ffd1dc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.gallery-box{ position: relative; width: 100%; height: 85%; padding: 10px; top: 40px; }
.slider{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.slide{ position:absolute; width:180px; height:280px; border-radius:16px; overflow:hidden; transition:.6s ease; filter:brightness(.45); transform:scale(.75); }
.slide.active{ transform:scale(1); filter:brightness(1); z-index:3; border: 2px solid #fff; }
.slide.left{ opacity:.6; transform:translateX(-200px) scale(.8); }
.slide.right{ opacity:.6; transform:translateX(200px) scale(.8); }

.nav{
  position:absolute; top:50%; transform:translateY(-50%); width:36px; height:36px;
  border-radius:50%; background:rgba(255,255,255,.35); color:#fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:5;
}
.nav.prev{left:10px} .nav.next{right:10px}

/* ===== CURSOR ===== */
body { cursor: none; }
.cursor-dot { 
  position: fixed; 
  top: 0; 
  left: 0; 
  pointer-events: none; 
  z-index: 100000; 
  transform: translate(-50%, -50%); 
  width: 8px; 
  height: 8px; 
  background: white; 
  border-radius: 50%; 
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
}

/* SEGURANÇA */
html, body, * { cursor: none !important; user-select: none !important; -webkit-user-select: none; }

#security-alert {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(83, 27, 94, 0.9); border: 1px solid rgba(237, 187, 250, 0.5);
  padding: 10px 25px; border-radius: 20px; color: #edc8fc; font-size: 13px;
  z-index: 1000000; transition: transform 0.4s ease; pointer-events: none;
}
#security-alert.show { transform: translateX(-50%) translateY(0); }

#stars{ position:fixed; inset:0; width:100%; height:100%; z-index:-1; background:#5b3a73; }
.footer{ position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-size:8px; color:#fdeef0aa; }
</style>
</head>

<body oncontextmenu="return false;">
<div class="cursor-dot"></div>

<div id="intro">
  <button class="gold-btn"><span class="text">ENTRAR</span></button>
</div>
<canvas id="stars"></canvas>

<div id="security-alert">Copyright - Acesso Proibido</div>

<div class="app">
  <div class="frame-outer">
    <div class="frame-inner">
      <div class="container">
        <div class="sidebar">
          <div class="profile-pic"><img src="https://xatimg.com/image/H3nFl0QOK3f7.jpg"></div>
          <div class="menu">
            <div class="menu-buttons">
              <div class="menu-btn active" onclick="showSection('inicio', this)">♡ Inicio ♡</div>
              <div class="menu-btn" onclick="showSection('sobremi', this)">♡ Sobre mim ♡</div>
              <div class="menu-btn" onclick="showSection('amigos', this)">♡ Amigos ♡</div>
              <div class="menu-btn" onclick="showSection('galeria', this)">♡ Galeria ♡</div>
              
              <div class="reproductor" id="reproductor">
                <div class="song-info">
                  <p class="titulo" id="artist">---</p>
                  <p class="cancion" id="title">---</p>
                </div>
                <div class="controles">
                  <div class="volume-container">
                    <span style="font-size:12px">🔊</span>
                    <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="1">
                  </div>
                  <button class="btn-control" id="nextBtn">⏭</button>
                  <button class="btn-control" id="playBtn">▶</button>
                </div>
                <audio id="audio"></audio>
              </div>
            </div>
          </div>
        </div>

        <div class="content">
          <div class="section active" id="inicio">
            <div class="inicio-wrapper">
              <div class="inicio-title">Bem vindos ao meu Xatspace</div>
              <div class="firma"><img src="https://xatimg.com/image/ytKJxwb0uEco.gif"></div>
            </div>
          </div>

          <div class="section" id="sobremi">
            <div class="sobremi-wrapper">
              <div class="sobremi-content">
                <div class="sobremi-nombre">Gabriel</div>
                <div class="sobremi-id">ID: 1777777</div>
                <div class="sobremi-pais">
                  <span>País:</span><img src="https://flagcdn.com/w20/br.png"><span>Brasil</span>
                </div>
                <div class="sobremi-linea"></div>
                <div class="sobremi-texto"><span id="typing"></span><span class="cursor"></span></div>
              </div>
            </div>
          </div>

          <div class="section" id="amigos">
            <div class="amigos-title">MEUS AMIGOS</div>
            <div class="amigos-container">
              <div class="amigos-collage">
                <div class="amigo-polaroid polaroid-0" onclick="openModal('Amigo 1','Frase do amigo 1')">
                  <img src="https://xatimg.com/image/PEq5yNtkJRP3.jpg"><p>Amigo 1</p>
                </div>
                <div class="amigo-polaroid polaroid-1" onclick="openModal('Amigo 2','Frase do amigo 2')">
                  <img src="https://xatimg.com/image/H3nFl0QOK3f7.jpg"><p>Amigo 2</p>
                </div>
              </div>
            </div>
          </div>

          <div class="section" id="galeria">
            <div class="gallery-title">GALERIA</div>
            <div class="gallery-box">
              <div class="slider">
                <div class="slide active"><img src="https://xatimg.com/image/q3UtxK6jIr20.jpg"></div>
                <div class="slide right"><img src="https://xatimg.com/image/K6IVS49hl2wQ.jpg"></div>
                <div class="slide"><img src="https://xatimg.com/image/q3UtxK6jIr20.jpg"></div>
              </div>
              <div class="nav prev" onclick="prev()">❮</div>
              <div class="nav next" onclick="next()">❯</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-contenido">
      <h3 id="modalNombre" style="color:#fff"></h3>
      <p id="modalDesc" style="color:#2b2b2b; font-size:13px"></p>
      <button onclick="closeModal()" style="margin-top:10px; cursor:pointer">Fechar</button>
    </div>
  </div>
  <div class="footer">By: Gabr</div>
</div>

<script>
// SEGURANÇA
const alertBox = document.getElementById('security-alert');
function triggerAlert() { alertBox.classList.add('show'); setTimeout(() => alertBox.classList.remove('show'), 2000); }
document.addEventListener('contextmenu', e => { e.preventDefault(); triggerAlert(); });
document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); triggerAlert(); } });
document.addEventListener('selectstart', e => { e.preventDefault(); triggerAlert(); });

// NAVEGAÇÃO
function showSection(id,el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

document.querySelector(".gold-btn").onclick = () => {
  document.getElementById("intro").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.querySelector(".app").classList.add("show");
    loadSong(current);
  }, 1000);
};

// MUSICA
const playlist = [
  { name: "Abraham-Mateo - BAI LALA", url: "https://www.dropbox.com/scl/fi/gw8940zfvm60ul7malxox/Abraham-Mateo-BAI-LALA.mp3?rlkey=puytwnkxllb6tmz35htfr8tmh&st=ud55ktgf&raw=1" },
  { name: "Alex Warren - Ordinary", url: "https://www.dropbox.com/scl/fi/lpcx92wv63wzcm6z56l7q/Alex-Warren-Ordinary.mp3?rlkey=pdxjo778t66ecrja08pfyij6k&st=zb53k17t&raw=1" },
  { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" }
];

let current = 0;
let isPlaying = false;
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const artist = document.getElementById("artist");
const title = document.getElementById("title");
const volumeRange = document.getElementById("volumeRange");
const reproductor = document.getElementById("reproductor");

function loadSong(index) {
  const song = playlist[index];
  audio.src = song.url;
  const parts = song.name.split(" - ");
  artist.textContent = parts[0];
  title.textContent = parts[1];
  audio.play(); isPlaying = true; playBtn.textContent = "❚❚";
}

playBtn.onclick = (e) => {
  e.stopPropagation();
  if (isPlaying) { audio.pause(); playBtn.textContent = "▶"; } 
  else { audio.play(); playBtn.textContent = "❚❚"; }
  isPlaying = !isPlaying;
};

document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); current = (current + 1) % playlist.length; loadSong(current); };
volumeRange.oninput = (e) => { audio.volume = e.target.value; };
reproductor.onmouseenter = () => reproductor.classList.add("expandido");
reproductor.onmouseleave = () => reproductor.classList.remove("expandido");

// TYPING
const texto="Sei que você sente falta daquela pessoa que você tirou do seu caminho...";
let idx=0;
function escribir(){ if(idx<texto.length){ document.getElementById("typing").textContent+=texto.charAt(idx++); setTimeout(escribir,35); } }
escribir();

// MODAL
function openModal(n, d){ document.getElementById("modalNombre").textContent=n; document.getElementById("modalDesc").textContent=d; document.getElementById("modal").classList.add("active"); }
function closeModal(){ document.getElementById("modal").classList.remove("active"); }

// GALERIA
const slides = document.querySelectorAll('.slide');
let curSlide = 0;
function updateSlides(){
  slides.forEach((s,i)=>{
    s.className = 'slide';
    if(i===curSlide) s.classList.add('active');
    else if(i===(curSlide-1+slides.length)%slides.length) s.classList.add('left');
    else if(i===(curSlide+1)%slides.length) s.classList.add('right');
  });
}
function next(){ curSlide=(curSlide+1)%slides.length; updateSlides(); }
function prev(){ curSlide=(curSlide-1+slides.length)%slides.length; updateSlides(); }

// CURSOR 
const dot = document.querySelector(".cursor-dot");
document.addEventListener("mousemove", e => { 
  dot.style.left=e.clientX+"px"; 
  dot.style.top=e.clientY+"px"; 
});

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }
window.onresize = resize; resize();
const stars = [];
for(let i=0; i<120; i++) stars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.5, s:Math.random()*0.4+0.2});
function draw(){
  ctx.clearRect(0,0,w,h); ctx.fillStyle="rgba(215,190,235,0.6)";
  stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y+=s.s; if(s.y>h) s.y=-5; });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
